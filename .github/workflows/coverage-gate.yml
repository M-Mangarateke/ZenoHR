# REQ-OPS-005: Code coverage enforcement — 90% domain line coverage, 85% branch coverage.
# TASK-150: Dedicated coverage gate workflow for ZenoHR CI pipeline.
# Runs on every PR to master and on push to master.

name: Coverage Gate

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

env:
  DOTNET_NOLOGO: 'true'
  DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  coverage:
    name: Coverage Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Build.props') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore ZenoHR.slnx

      - name: Build
        run: dotnet build ZenoHR.slnx --configuration Release --no-restore

      - name: Run tests with coverage (excluding integration tests)
        run: |
          dotnet test ZenoHR.slnx \
            --configuration Release \
            --no-build \
            --filter "FullyQualifiedName!~ZenoHR.Integration" \
            --collect:"XPlat Code Coverage" \
            --settings coverlet.runsettings \
            --results-directory ./coverage

      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Generate coverage report
        # Filter to Domain + Module assemblies only (same as ci.yml).
        # Infrastructure, Api, and Web are excluded from coverage gates.
        run: |
          reportgenerator \
            -reports:./coverage/**/coverage.cobertura.xml \
            -targetdir:./coverage/report \
            -reporttypes:"Html;Badges;TextSummary" \
            -assemblyfilters:"+ZenoHR.Domain;+ZenoHR.Module.*" \
            -classfilters:"-*AssemblyMarker"

      - name: Check coverage thresholds
        # REQ-OPS-005: Coverage gate — ratchet thresholds up as coverage improves.
        # Current: line ~47%, branch ~48% (2026-03-15). Targets: 90% line, 85% branch by v1.0.
        # Note: coverlet.runsettings uses Cobertura format; ci.yml uses OpenCover with different
        # assembly filters — the two workflows may report different numbers.
        run: |
          SUMMARY=$(cat ./coverage/report/Summary.txt)
          echo "$SUMMARY"

          # Extract line coverage percentage
          LINE_COV=$(echo "$SUMMARY" | grep "Line coverage" | grep -oP '[\d.]+%' | head -1 | tr -d '%')
          BRANCH_COV=$(echo "$SUMMARY" | grep "Branch coverage" | grep -oP '[\d.]+%' | head -1 | tr -d '%')

          echo "Line coverage: ${LINE_COV}%"
          echo "Branch coverage: ${BRANCH_COV}%"

          FAILED=0

          # REQ-OPS-005: 40% line coverage threshold (ratchet up as tests are added)
          if (( $(echo "$LINE_COV < 40" | bc -l) )); then
            echo "::error::Line coverage ${LINE_COV}% is below 40% threshold (REQ-OPS-005). Build FAILED."
            FAILED=1
          else
            echo "Line coverage gate PASSED (${LINE_COV}% >= 40%)"
          fi

          # REQ-OPS-005: 40% branch coverage threshold (ratchet up as tests are added)
          if (( $(echo "$BRANCH_COV < 40" | bc -l) )); then
            echo "::error::Branch coverage ${BRANCH_COV}% is below 40% threshold (REQ-OPS-005). Build FAILED."
            FAILED=1
          else
            echo "Branch coverage gate PASSED (${BRANCH_COV}% >= 40%)"
          fi

          if [ "$FAILED" -eq 1 ]; then
            exit 1
          fi

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: ./coverage/report/
          retention-days: 30
